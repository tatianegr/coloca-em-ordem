<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coloca em Ordem</title>

  <link
    rel="icon"
    type="image/svg+xml"
    href='data:image/svg+xml;utf8,
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <rect width="64" height="64" rx="14" fill="%230b0f19"/>
      <rect x="8" y="8" width="48" height="48" rx="10" fill="%234f8cff"/>
      <path d="M20 20h24v6H35v18h-6V26h-9z" fill="white"/>
    </svg>'
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      overflow-x: hidden;
    }

    :root {
      --bg: #0b0f19;
      --panel: #121826;
      --panel-2: #1a2235;
      --border: #2b3550;
      --text: #f3f6ff;
      --muted: #a7b1c7;
      --accent: #4f8cff;
      --accent-hover: #3b74dd;
      --output-bg: #0f1524;
      --footer: #8f9ab3;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 10px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .header {
      margin-bottom: 6px;
      flex-shrink: 0;
    }

    h1 {
      font-size: 26px;
      margin: 0 0 6px;
      font-weight: 700;
      line-height: 1.2;
    }

    .description {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      color: var(--muted);
      max-width: 760px;
    }

    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .content {
      display: flex;
      align-items: stretch;
      gap: 18px;
      flex-wrap: nowrap;
      flex: 1;
      min-height: 0;
    }

    .panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .paineis-header {
      display: flex;
      align-items: stretch;
      gap: 18px;
      margin-bottom: 6px;
      flex-shrink: 0;
    }

    .paineis-header > label.title {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .actions-spacer {
      flex: 0 0 54px;
    }

    .resultado-header {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    label.title {
      display: block;
      font-size: 17px;
      color: var(--muted);
      font-weight: 600;
    }

    .btn-copiar {
      width: auto;
      height: auto;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--muted);
      border: 1px solid var(--border);
      transform: none;
    }

    .btn-copiar:hover {
      background: var(--border);
      color: var(--text);
      transform: none;
    }

    .btn-copiar.copiado {
      background: #1a3a1a;
      color: #6fcf6f;
      border-color: #3a6a3a;
    }

    textarea {
      width: 100%;
      flex: 1;
      min-height: 100px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.5;
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: none;
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    textarea::placeholder {
      color: #7f8aa3;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.18);
    }

    #textoSaida {
      width: 100%;
      flex: 1;
      min-height: 100px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.5;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--output-bg);
      color: var(--text);
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      cursor: text;
      user-select: text;
    }

    #textoSaida:empty::before {
      content: "O resultado aparecerá aqui...";
      color: #7f8aa3;
    }

    #textoSaida ul {
      margin: 0;
      padding-left: 22px;
    }

    #textoSaida li {
      margin-bottom: 2px;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 54px;
    }

    button {
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 30px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .contador {
      display: flex;
      gap: 18px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .contador span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .contador strong {
      color: var(--text);
      font-weight: 600;
    }

    .options {
      margin-top: 8px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 16px;
      color: var(--text);
      flex-shrink: 0;
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .options input[type="radio"] {
      transform: scale(1.1);
      cursor: pointer;
    }

    footer {
      text-align: center;
      margin-top: 8px;
      padding: 0;
      font-size: 14px;
      color: var(--footer);
      flex-shrink: 0;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--panel-2);
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 6px;
      border: 2px solid var(--panel-2);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    ::-webkit-scrollbar-button {
      display: none;
    }

    ::-webkit-resizer {
      display: none;
    }

    @media (max-width: 900px) {
      .paineis-header {
        flex-direction: column;
        gap: 6px;
      }

      .actions-spacer {
        display: none;
      }

      .resultado-header {
        width: 100%;
      }

      .content {
        flex-direction: column;
        align-items: stretch;
        flex-wrap: wrap;
      }

      .actions {
        height: auto;
        justify-content: stretch;
        flex: none;
      }

      button {
        width: 100%;
        height: 50px;
        font-size: 26px;
      }

      h1 {
        font-size: 24px;
      }

      .description {
        font-size: 15px;
      }

      label.title {
        font-size: 17px;
        min-height: auto;
      }

      textarea {
        font-size: 17px;
        min-height: 120px;
      }

      .options {
        font-size: 15px;
        gap: 14px;
      }

      footer {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Coloca em Ordem</h1>
      <p class="description">
        Transforme seu texto em segundos. Converta maiúsculas e minúsculas, formate bullet points para o Docs, remova números ou ordene palavras-chave por volume de busca.
      </p>
    </div>

    <div class="box">
      <div class="paineis-header">
        <label for="textoEntrada" class="title">Digite ou cole o texto no campo abaixo:</label>
        <div class="actions-spacer"></div>
        <div class="resultado-header">
          <label class="title">Resultado:</label>
          <button id="btnCopiar" title="Copiar resultado" class="btn-copiar">Copiar</button>
        </div>
      </div>

      <div class="content">
        <div class="panel">
          <textarea id="textoEntrada" placeholder="Digite seu texto aqui..."></textarea>
        </div>

        <div class="actions">
          <button id="btnConverter" title="Converter">&#x203A;</button>
        </div>

        <div class="panel">
          <div id="textoSaida"></div>
        </div>
      </div>

      <div class="contador">
        <span><strong id="cntPalavras">0</strong> palavras</span>
        <span><strong id="cntCaracteres">0</strong> caracteres</span>
        <span><strong id="cntLinhas">0</strong> linhas</span>
        <button id="btnLimpar" class="btn-copiar" style="margin-left:auto;">Limpar</button>
      </div>

      <div class="options">
        <label>
          <input type="radio" name="tipoConversao" value="maiusculas">
          Maiúsculas
        </label>
        <label>
          <input type="radio" name="tipoConversao" value="minusculas" checked>
          Minúsculas
        </label>
        <label>
          <input type="radio" name="tipoConversao" value="primeiraLetra">
          Primeira letra
        </label>
        <label>
          <input type="radio" name="tipoConversao" value="titleCase">
          Title Case
        </label>
        <label>
          <input type="radio" name="tipoConversao" value="bulletPointNegritoDocs">
          Bullet point com negrito para Docs
        </label>
        <label>
          <input type="radio" name="tipoConversao" value="bulletPointMarkdown">
          Bullet point para Docs
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="removerNumeros">
          Remover números
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="removerDuplicatas">
          Remover duplicatas
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="removerLinhasEmBranco">
          Remover linhas em branco
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="numerarLinhas">
          Numerar linhas
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="juntarLinhas">
          Juntar linhas
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="ordenarLinhas">
          Ordenar linhas
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="slug">
          Slug/URL
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="adicionarPrefixo">
          Adicionar prefixo
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="organizarVolume">
          Organizar Palavra-chave e Volume
        </label>
        <label style="white-space:nowrap;">
          <input type="radio" name="tipoConversao" value="extrairPalavrasChave">
          Extrair palavras-chave
        </label>
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;white-space:nowrap;">
          <span>Ordem:</span>
          <label style="color:var(--text);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:6px;">
            <input type="radio" name="ordemConversao" value="decrescente" checked> &#x2193;
          </label>
          <label style="color:var(--text);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:6px;">
            <input type="radio" name="ordemConversao" value="crescente"> &#x2191;
          </label>
        </div>
      </div>

      <div id="prefixoContainer" style="display:none;margin-top:10px;align-items:center;gap:10px;">
        <label for="inputPrefixo" style="color:var(--muted);font-size:14px;white-space:nowrap;">Prefixo:</label>
        <input type="text" id="inputPrefixo" placeholder='ex: "- " ou "https://site.com/"'
          style="flex:1;max-width:400px;padding:6px 12px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--panel-2);color:var(--text);outline:none;">
      </div>
    </div>

    <footer>
      Desenvolvido por alguém que não manja absolutamente nada de programação &#x1F605;
    </footer>
  </div>

  <script>
    const textoEntrada = document.getElementById("textoEntrada");
    const textoSaida = document.getElementById("textoSaida");
    const btnConverter = document.getElementById("btnConverter");
    const btnCopiar = document.getElementById("btnCopiar");
    const opcoesConversao = document.querySelectorAll('input[name="tipoConversao"]');
    const cntPalavras = document.getElementById("cntPalavras");
    const cntCaracteres = document.getElementById("cntCaracteres");
    const cntLinhas = document.getElementById("cntLinhas");

    const medidorLinhas = document.createElement("textarea");
    medidorLinhas.setAttribute("aria-hidden", "true");
    Object.assign(medidorLinhas.style, {
      position: "fixed",
      top: "-9999px",
      left: "-9999px",
      visibility: "hidden",
      height: "auto",
      overflow: "hidden",
    });
    document.body.appendChild(medidorLinhas);

    function sincronizarEstiloMedidor() {
      const cs = getComputedStyle(textoEntrada);
      medidorLinhas.style.width = textoEntrada.clientWidth + "px";
      medidorLinhas.style.font = cs.font;
      medidorLinhas.style.padding = cs.padding;
      medidorLinhas.style.lineHeight = cs.lineHeight;
      medidorLinhas.style.whiteSpace = "pre-wrap";
      medidorLinhas.style.wordBreak = cs.wordBreak;
    }

    function contarLinhasVisuais(texto) {
      if (texto === "") return 0;
      medidorLinhas.value = texto;
      const cs = getComputedStyle(medidorLinhas);
      const lineHeight = parseFloat(cs.lineHeight);
      const paddingTop = parseFloat(cs.paddingTop);
      const paddingBottom = parseFloat(cs.paddingBottom);
      return Math.max(1, Math.round((medidorLinhas.scrollHeight - paddingTop - paddingBottom) / lineHeight));
    }

    window.addEventListener("resize", sincronizarEstiloMedidor);

    function atualizarContador() {
      const texto = textoEntrada.value;
      cntCaracteres.textContent = texto.length;
      cntPalavras.textContent = texto.trim() === "" ? 0 : texto.trim().split(/\s+/).length;
      cntLinhas.textContent = contarLinhasVisuais(texto);
    }

    function capitalizarPrimeiraLetraDeCadaLinha(texto) {
      return texto
        .split("\n")
        .map((linha) => {
          const linhaSemEspacosInicio = linha.trimStart();
          if (!linhaSemEspacosInicio) return linha;
          const indicePrimeiraLetra = linha.indexOf(linhaSemEspacosInicio[0]);
          return (
            linha.slice(0, indicePrimeiraLetra) +
            linhaSemEspacosInicio.charAt(0).toUpperCase() +
            linhaSemEspacosInicio.slice(1).toLowerCase()
          );
        })
        .join("\n");
    }

    function splitFrases(texto) {
      return texto
        .split(/(?<=[.!?])\s+|\n+/)
        .map((f) => f.trim().replace(/[;.!?]+$/, ""))
        .filter((f) => f.length > 0);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatarBulletPointMarkdown(texto) {
      const frases = splitFrases(texto);
      if (frases.length === 0) return "";
      return "<ul>" + frases.map((frase, i) =>
        `<li>${escapeHtml(frase)}${i < frases.length - 1 ? ";" : "."}</li>`
      ).join("") + "</ul>";
    }

    function formatarBulletPointNegritoDocs(texto) {
      const frases = splitFrases(texto);
      if (frases.length === 0) return "";
      return "<ul>" + frases.map((frase, i) => {
        const pontuacao = i < frases.length - 1 ? ";" : ".";
        const colonIndex = frase.indexOf(":");
        if (colonIndex > 0) {
          return `<li><b>${escapeHtml(frase.slice(0, colonIndex))}</b>${escapeHtml(frase.slice(colonIndex))}${pontuacao}</li>`;
        }
        return `<li>${escapeHtml(frase)}${pontuacao}</li>`;
      }).join("") + "</ul>";
    }

    function removerLinhasEmBranco(texto) {
      return texto.split("\n").filter(l => l.trim().length > 0).join("\n");
    }

    function numerarLinhas(texto) {
      return texto.split("\n").filter(l => l.trim().length > 0)
        .map((linha, i) => `${i + 1}. ${linha}`).join("\n");
    }

    function juntarLinhas(texto) {
      return texto.split("\n").filter(l => l.trim().length > 0).join(", ");
    }

    function gerarSlug(texto) {
      return texto.split("\n")
        .map(linha => linha.normalize("NFD").replace(/[̀-ͯ]/g, "")
          .toLowerCase().replace(/[^a-z0-9\s-]/g, "").trim()
          .replace(/\s+/g, "-").replace(/-+/g, "-"))
        .filter(l => l.length > 0).join("\n");
    }

    function adicionarPrefixo(texto, prefixo) {
      return texto.split("\n").filter(l => l.trim().length > 0)
        .map(linha => `${prefixo}${linha}`).join("\n");
    }

    function titleCase(texto) {
      return texto.split("\n")
        .map(linha => linha.replace(/\S+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()))
        .join("\n");
    }

    function ordenarLinhas(texto, crescente = true) {
      const linhas = texto.split("\n").filter(l => l.trim().length > 0);
      linhas.sort((a, b) => crescente ? a.localeCompare(b, "pt") : b.localeCompare(a, "pt"));
      return linhas.join("\n");
    }

    function removerDuplicatas(texto) {
      const vistas = new Set();
      return texto.split("\n").filter(linha => {
        const chave = linha.trim().toLowerCase();
        if (!chave || vistas.has(chave)) return false;
        vistas.add(chave);
        return true;
      }).join("\n");
    }

    function extrairPalavrasChave(texto) {
      const linhas = texto.split("\n").map(l => l.trim()).filter(l => l.length > 0);
      const keywords = [];
      for (const linha of linhas) {
        let keyword = null, volume = null;
        const partes = linha.split("\t");
        if (partes.length >= 3) {
          const ck = partes[1].trim(), cv = partes[2].replace(/[^\d.]/g, "").trim();
          if (ck && /^\d[\d.]*$/.test(cv)) { keyword = ck; volume = cv; }
        }
        if (!keyword) {
          const m = linha.match(/^(.+?)\s*\((\d{1,3}(?:\.\d{3})*|\d+)\)$/u);
          if (m) { keyword = m[1].trim(); volume = m[2]; }
        }
        if (!keyword) {
          const m = linha.replace(/^\d+/, "").match(/^([\p{L}\s]+?)\s*(\d{1,3}(?:\.\d{3})*|\d+)(?=\D|$)/u);
          if (m) { keyword = m[1].trim(); volume = m[2]; }
        }
        if (keyword) keywords.push(keyword);
      }
      return keywords.join("\n");
    }

    function organizarPalavrasChaveVolume(texto, crescente = false) {
      const linhas = texto.split("\n").map(l => l.trim()).filter(l => l.length > 0);
      const itens = [];
      for (const linha of linhas) {
        let keyword = null, volume = null;
        const partes = linha.split("\t");
        if (partes.length >= 3) {
          const ck = partes[1].trim(), cv = partes[2].replace(/[^\d.]/g, "").trim();
          if (ck && /^\d[\d.]*$/.test(cv)) { keyword = ck; volume = cv; }
        }
        if (!keyword) {
          const match = linha.match(/^(.+?)\s*\((\d{1,3}(?:\.\d{3})*|\d+)\)$/u);
          if (match) { keyword = match[1].trim(); volume = match[2]; }
        }
        if (!keyword) {
          const match = linha.replace(/^\d+/, "").match(/^([\p{L}\s]+?)\s*(\d{1,3}(?:\.\d{3})*|\d+)(?=\D|$)/u);
          if (match) { keyword = match[1].trim(); volume = match[2]; }
        }
        if (keyword && volume) {
          const volumeNum = parseInt(volume.replace(/\./g, ""), 10);
          if (!isNaN(volumeNum) && volumeNum > 0) itens.push({ keyword, volume, volumeNum });
        }
      }
      itens.sort((a, b) => crescente ? a.volumeNum - b.volumeNum : b.volumeNum - a.volumeNum);
      return itens.map(item => `${item.keyword} (${item.volume})`).join("\n");
    }

    let ultimoResultado = null;

    function converterTexto(encadear = false) {
      const texto = (encadear && ultimoResultado !== null) ? ultimoResultado : textoEntrada.value;
      const tipo = document.querySelector('input[name="tipoConversao"]:checked').value;
      const crescente = document.querySelector('input[name="ordemConversao"]:checked').value === "crescente";

      if (tipo === "maiusculas") textoSaida.textContent = texto.toUpperCase();
      else if (tipo === "minusculas") textoSaida.textContent = texto.toLowerCase();
      else if (tipo === "primeiraLetra") textoSaida.textContent = capitalizarPrimeiraLetraDeCadaLinha(texto);
      else if (tipo === "bulletPointMarkdown") textoSaida.innerHTML = formatarBulletPointMarkdown(texto);
      else if (tipo === "bulletPointNegritoDocs") textoSaida.innerHTML = formatarBulletPointNegritoDocs(texto);
      else if (tipo === "titleCase") textoSaida.textContent = titleCase(texto);
      else if (tipo === "removerLinhasEmBranco") textoSaida.textContent = removerLinhasEmBranco(texto);
      else if (tipo === "numerarLinhas") textoSaida.textContent = numerarLinhas(texto);
      else if (tipo === "juntarLinhas") textoSaida.textContent = juntarLinhas(texto);
      else if (tipo === "slug") textoSaida.textContent = gerarSlug(texto);
      else if (tipo === "adicionarPrefixo") textoSaida.textContent = adicionarPrefixo(texto, document.getElementById("inputPrefixo").value);
      else if (tipo === "removerDuplicatas") textoSaida.textContent = removerDuplicatas(texto);
      else if (tipo === "ordenarLinhas") textoSaida.textContent = ordenarLinhas(texto, crescente);
      else if (tipo === "extrairPalavrasChave") textoSaida.textContent = extrairPalavrasChave(texto);
      else if (tipo === "removerNumeros") textoSaida.textContent = texto.split("\n")
        .map(l => l.replace(/\s*\(?\d+\)?/g, "").replace(/[ \t]{2,}/g, " ").trim()).join("\n");
      else if (tipo === "organizarVolume") textoSaida.textContent = organizarPalavrasChaveVolume(texto, crescente);

      ultimoResultado = textoSaida.innerText.trim() || null;
    }

    document.getElementById("btnLimpar").addEventListener("click", () => {
      textoEntrada.value = "";
      textoSaida.textContent = "";
      ultimoResultado = null;
      atualizarContador();
    });

    btnCopiar.addEventListener("click", () => {
      const tipo = document.querySelector('input[name="tipoConversao"]:checked').value;
      if (!textoSaida.innerText.trim()) return;
      const concluir = () => {
        btnCopiar.textContent = "Copiado!";
        btnCopiar.classList.add("copiado");
        setTimeout(() => { btnCopiar.textContent = "Copiar"; btnCopiar.classList.remove("copiado"); }, 2000);
      };
      if (["bulletPointMarkdown", "bulletPointNegritoDocs"].includes(tipo)) {
        navigator.clipboard.write([new ClipboardItem({
          "text/html": new Blob([textoSaida.innerHTML], { type: "text/html" }),
          "text/plain": new Blob([textoSaida.innerText], { type: "text/plain" }),
        })]).then(concluir);
      } else {
        navigator.clipboard.writeText(textoSaida.textContent).then(concluir);
      }
    });

    btnConverter.addEventListener("click", () => { ultimoResultado = null; converterTexto(false); });

    textoEntrada.addEventListener("input", () => { ultimoResultado = null; converterTexto(false); atualizarContador(); });

    textoEntrada.addEventListener("paste", () => {
      setTimeout(() => { ultimoResultado = null; converterTexto(false); atualizarContador(); }, 0);
    });

    function atualizarVisibilidadePrefixo() {
      const sel = document.querySelector('input[name="tipoConversao"]:checked').value;
      document.getElementById("prefixoContainer").style.display = sel === "adicionarPrefixo" ? "flex" : "none";
    }

    opcoesConversao.forEach(opcao => opcao.addEventListener("change", () => {
      atualizarVisibilidadePrefixo();
      converterTexto(true);
    }));

    document.getElementById("inputPrefixo").addEventListener("input", () => converterTexto(true));

    document.querySelectorAll('input[name="ordemConversao"]').forEach(opcao =>
      opcao.addEventListener("change", () => converterTexto(true))
    );

    sincronizarEstiloMedidor();
  </script>
</body>
</html>
