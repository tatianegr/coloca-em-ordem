<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coloca em Ordem</title>

  <link
    rel="icon"
    type="image/svg+xml"
    href='data:image/svg+xml;utf8,
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <rect width="64" height="64" rx="14" fill="%230b0f19"/>
      <rect x="8" y="8" width="48" height="48" rx="10" fill="%234f8cff"/>
      <path d="M20 20h24v6H35v18h-6V26h-9z" fill="white"/>
    </svg>'
  />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0f19;
      --panel: #121826;
      --panel-2: #1a2235;
      --border: #2b3550;
      --text: #f3f6ff;
      --muted: #a7b1c7;
      --accent: #4f8cff;
      --accent-hover: #3b74dd;
      --output-bg: #0f1524;
      --footer: #8f9ab3;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1180px;
      margin: 18px auto;
      padding: 0 16px 18px;
    }

    .header {
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      font-weight: 700;
      line-height: 1.2;
    }

    .description {
      margin: 0;
      font-size: 16px;
      line-height: 1.5;
      color: var(--muted);
      max-width: 760px;
    }

    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .content {
      display: flex;
      align-items: flex-start;
      gap: 22px;
      flex-wrap: nowrap;
    }

    .panel {
      flex: 1;
      min-width: 0;
    }

    label.title {
      display: block;
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 600;
      min-height: 26px;
    }

    textarea {
      width: 100%;
      height: 230px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.5;
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    textarea::placeholder {
      color: #7f8aa3;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.18);
    }

    #textoSaida {
      width: 100%;
      min-height: 230px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.5;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--output-bg);
      color: var(--text);
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      cursor: text;
      user-select: text;
    }

    #textoSaida:empty::before {
      content: "O resultado aparecerá aqui...";
      color: #7f8aa3;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 118px;
      flex: 0 0 54px;
    }

    button {
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 30px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .contador {
      display: flex;
      gap: 18px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .contador span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .contador strong {
      color: var(--text);
      font-weight: 600;
    }

    .options {
      margin-top: 14px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 16px;
      color: var(--text);
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .options input[type="radio"] {
      transform: scale(1.1);
      cursor: pointer;
    }

    footer {
      text-align: center;
      margin-top: 16px;
      padding: 4px 0 0;
      font-size: 14px;
      color: var(--footer);
    }

    @media (max-width: 900px) {
      .content {
        flex-direction: column;
        align-items: stretch;
        flex-wrap: wrap;
      }

      .actions {
        padding-top: 0;
        justify-content: stretch;
        flex: none;
      }

      button {
        width: 100%;
        height: 50px;
        font-size: 26px;
      }

      h1 {
        font-size: 24px;
      }

      .description {
        font-size: 15px;
      }

      label.title {
        font-size: 17px;
        min-height: auto;
      }

      textarea {
        font-size: 17px;
        height: 200px;
      }

      .options {
        font-size: 15px;
        gap: 14px;
      }

      footer {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Coloca em Ordem</h1>
      <p class="description">
        Organize seu texto em segundos. Cole ou digite abaixo e ajuste automaticamente para maiúsculas,
        minúsculas, primeira letra destacada ou formato de lista, sem complicação.
      </p>
    </div>

    <div class="box">
      <div class="content">
        <div class="panel">
          <label for="textoEntrada" class="title">Digite ou cole o texto no campo abaixo:</label>
          <textarea id="textoEntrada" placeholder="Digite seu texto aqui..."></textarea>

          <div class="contador">
            <span><strong id="cntPalavras">0</strong> palavras</span>
            <span><strong id="cntCaracteres">0</strong> caracteres</span>
            <span><strong id="cntLinhas">0</strong> linhas</span>
          </div>

          <div class="options">
            <label>
              <input type="radio" name="tipoConversao" value="maiusculas">
              Maiúsculas
            </label>

            <label>
              <input type="radio" name="tipoConversao" value="minusculas" checked>
              Minúsculas
            </label>

            <label>
              <input type="radio" name="tipoConversao" value="primeiraLetra">
              Primeira letra
            </label>

            <label>
              <input type="radio" name="tipoConversao" value="bulletPoint">
              Bullet point
            </label>

            <label>
              <input type="radio" name="tipoConversao" value="bulletPointNegrito">
              Bullet point com negrito
            </label>
          </div>
        </div>

        <div class="actions">
          <button id="btnConverter" title="Converter">›</button>
        </div>

        <div class="panel">
          <label class="title">Resultado:</label>
          <div id="textoSaida"></div>
        </div>
      </div>
    </div>

    <footer>
      Desenvolvido por Tatiane Gomes
    </footer>
  </div>

  <script>
    const textoEntrada = document.getElementById("textoEntrada");
    const textoSaida = document.getElementById("textoSaida");
    const btnConverter = document.getElementById("btnConverter");
    const opcoesConversao = document.querySelectorAll('input[name="tipoConversao"]');
    const cntPalavras = document.getElementById("cntPalavras");
    const cntCaracteres = document.getElementById("cntCaracteres");
    const cntLinhas = document.getElementById("cntLinhas");

    function atualizarContador() {
      const texto = textoEntrada.value;
      cntCaracteres.textContent = texto.length;
      cntPalavras.textContent = texto.trim() === "" ? 0 : texto.trim().split(/\s+/).length;
      cntLinhas.textContent = texto === "" ? 0 : texto.split("\n").length;
    }

    function capitalizarPrimeiraLetraDeCadaLinha(texto) {
      return texto
        .split("\n")
        .map((linha) => {
          const linhaSemEspacosInicio = linha.trimStart();

          if (!linhaSemEspacosInicio) {
            return linha;
          }

          const indicePrimeiraLetra = linha.indexOf(linhaSemEspacosInicio[0]);

          return (
            linha.slice(0, indicePrimeiraLetra) +
            linhaSemEspacosInicio.charAt(0).toUpperCase() +
            linhaSemEspacosInicio.slice(1).toLowerCase()
          );
        })
        .join("\n");
    }

    function splitFrases(texto) {
      return texto
        .split(/(?<=[.!?])\s+|\n+/)
        .map((f) => f.trim().replace(/[;.!?]+$/, ""))
        .filter((f) => f.length > 0);
    }

    function formatarBulletPoint(texto) {
      const frases = splitFrases(texto);
      if (frases.length === 0) return "";
      return frases
        .map((frase, i) => (i < frases.length - 1 ? frase + ";" : frase + "."))
        .join("\n");
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatarBulletPointNegrito(texto) {
      const frases = splitFrases(texto);
      if (frases.length === 0) return "";
      return frases
        .map((frase, i) => {
          const pontuacao = i < frases.length - 1 ? ";" : ".";
          const colonIndex = frase.indexOf(":");
          if (colonIndex > 0) {
            const antes = escapeHtml(frase.slice(0, colonIndex));
            const depois = escapeHtml(frase.slice(colonIndex));
            return `<b>${antes}</b>${depois}${pontuacao}`;
          }
          return escapeHtml(frase) + pontuacao;
        })
        .join("<br>");
    }

    function converterTexto() {
      const texto = textoEntrada.value;
      const tipoSelecionado = document.querySelector('input[name="tipoConversao"]:checked').value;

      if (tipoSelecionado === "maiusculas") {
        textoSaida.textContent = texto.toUpperCase();
      } else if (tipoSelecionado === "minusculas") {
        textoSaida.textContent = texto.toLowerCase();
      } else if (tipoSelecionado === "primeiraLetra") {
        textoSaida.textContent = capitalizarPrimeiraLetraDeCadaLinha(texto);
      } else if (tipoSelecionado === "bulletPoint") {
        textoSaida.textContent = formatarBulletPoint(texto);
      } else if (tipoSelecionado === "bulletPointNegrito") {
        textoSaida.innerHTML = formatarBulletPointNegrito(texto);
      }
    }

    btnConverter.addEventListener("click", converterTexto);
    textoEntrada.addEventListener("input", () => { converterTexto(); atualizarContador(); });

    textoEntrada.addEventListener("paste", () => {
      setTimeout(() => { converterTexto(); atualizarContador(); }, 0);
    });

    opcoesConversao.forEach((opcao) => {
      opcao.addEventListener("change", converterTexto);
    });
  </script>
</body>
</html>
