<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coloca em Ordem</title>

  <link
    rel="icon"
    type="image/svg+xml"
    href='data:image/svg+xml;utf8,
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <rect width="64" height="64" rx="14" fill="%230b0f19"/>
      <rect x="8" y="8" width="48" height="48" rx="10" fill="%234f8cff"/>
      <path d="M20 20h24v6H35v18h-6V26h-9z" fill="white"/>
    </svg>'
  />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0f19;
      --panel: #121826;
      --panel-2: #1a2235;
      --border: #2b3550;
      --text: #f3f6ff;
      --muted: #a7b1c7;
      --accent: #4f8cff;
      --accent-hover: #3b74dd;
      --output-bg: #0f1524;
      --footer: #8f9ab3;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1180px;
      margin: 12px auto;
      padding: 0 16px 12px;
    }

    .header {
      margin-bottom: 10px;
    }

    h1 {
      font-size: 26px;
      margin: 0 0 6px;
      font-weight: 700;
      line-height: 1.2;
    }

    .description {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      color: var(--muted);
      max-width: 760px;
    }

    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .content {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: nowrap;
    }

    .panel {
      flex: 1;
      min-width: 0;
    }

    .paineis-header {
      display: flex;
      align-items: stretch;
      gap: 18px;
      margin-bottom: 10px;
    }

    .paineis-header > label.title {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .actions-spacer {
      flex: 0 0 54px;
    }

    .resultado-header {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    label.title {
      display: block;
      font-size: 17px;
      color: var(--muted);
      font-weight: 600;
    }

    .btn-copiar {
      width: auto;
      height: auto;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--muted);
      border: 1px solid var(--border);
      transform: none;
    }

    .btn-copiar:hover {
      background: var(--border);
      color: var(--text);
      transform: none;
    }

    .btn-copiar.copiado {
      background: #1a3a1a;
      color: #6fcf6f;
      border-color: #3a6a3a;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.5;
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    textarea::placeholder {
      color: #7f8aa3;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.18);
    }

    #textoSaida {
      width: 100%;
      height: 200px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.5;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--output-bg);
      color: var(--text);
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      cursor: text;
      user-select: text;
    }

    #textoSaida:empty::before {
      content: "O resultado aparecerá aqui...";
      color: #7f8aa3;
    }

    #textoSaida ul {
      margin: 0;
      padding-left: 22px;
    }

    #textoSaida li {
      margin-bottom: 2px;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 54px;
      height: 200px;
    }

    button {
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 30px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .contador {
      display: flex;
      gap: 18px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .contador span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .contador strong {
      color: var(--text);
      font-weight: 600;
    }

    .options {
      margin-top: 14px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 16px;
      color: var(--text);
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .options input[type="radio"] {
      transform: scale(1.1);
      cursor: pointer;
    }

    footer {
      text-align: center;
      margin-top: 16px;
      padding: 4px 0 0;
      font-size: 14px;
      color: var(--footer);
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--panel-2);
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 6px;
      border: 2px solid var(--panel-2);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    ::-webkit-scrollbar-button {
      display: none;
    }

    ::-webkit-resizer {
      display: none;
    }

    @media (max-width: 900px) {
      .paineis-header {
        flex-direction: column;
        gap: 6px;
      }

      .actions-spacer {
        display: none;
      }

      .resultado-header {
        width: 100%;
      }

      .content {
        flex-direction: column;
        align-items: stretch;
        flex-wrap: wrap;
      }

      .actions {
        height: auto;
        justify-content: stretch;
        flex: none;
      }

      button {
        width: 100%;
        height: 50px;
        font-size: 26px;
      }

      h1 {
        font-size: 24px;
      }

      .description {
        font-size: 15px;
      }

      label.title {
        font-size: 17px;
        min-height: auto;
      }

      textarea {
        font-size: 17px;
        height: 200px;
      }

      .options {
        font-size: 15px;
        gap: 14px;
      }

      footer {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Coloca em Ordem</h1>
      <p class="description">
        Transforme seu texto em segundos. Converta maiúsculas e minúsculas, formate bullet points para o Docs, remova números ou ordene palavras-chave por volume de busca.
      </p>
    </div>

    <div class="box">
        <!-- Cabeçalhos numa linha separada para garantir alinhamento -->
        <div class="paineis-header">
          <label for="textoEntrada" class="title">Digite ou cole o texto no campo abaixo:</label>
          <div class="actions-spacer"></div>
          <div class="resultado-header">
            <label class="title">Resultado:</label>
            <button id="btnCopiar" title="Copiar resultado" class="btn-copiar">Copiar</button>
          </div>
        </div>

        <!-- Caixas de texto + botão converter sempre alinhados -->
        <div class="content">
          <div class="panel">
            <textarea id="textoEntrada" placeholder="Digite seu texto aqui..."></textarea>

            <div class="contador">
              <span><strong id="cntPalavras">0</strong> palavras</span>
              <span><strong id="cntCaracteres">0</strong> caracteres</span>
              <span><strong id="cntLinhas">0</strong> linhas</span>
            </div>

            <div class="options">
              <label>
                <input type="radio" name="tipoConversao" value="maiusculas">
                Maiúsculas
              </label>

              <label>
                <input type="radio" name="tipoConversao" value="minusculas" checked>
                Minúsculas
              </label>

              <label>
                <input type="radio" name="tipoConversao" value="primeiraLetra">
                Primeira letra
              </label>

              <label>
                <input type="radio" name="tipoConversao" value="bulletPointNegritoDocs">
                Bullet point com negrito para Docs
              </label>

              <label>
                <input type="radio" name="tipoConversao" value="bulletPointMarkdown">
                Bullet point para Docs
              </label>

              <div style="display:flex;align-items:center;gap:18px;width:100%;">
                <label style="white-space:nowrap;">
                  <input type="radio" name="tipoConversao" value="removerNumeros">
                  Remover números
                </label>

                <label style="white-space:nowrap;">
                  <input type="radio" name="tipoConversao" value="organizarPalavrasChaveVolume">
                  Organizar Palavra-chave e Volume de Busca
                </label>
              </div>
            </div>
          </div>

          <div class="actions">
            <button id="btnConverter" title="Converter">›</button>
          </div>

          <div class="panel">
            <div id="textoSaida"></div>
          </div>
        </div>
    </div>

    <footer>
      Desenvolvido por alguém que não manja absolutamente nada de programação 😅
    </footer>
  </div>

  <script>
    const textoEntrada = document.getElementById("textoEntrada");
    const textoSaida = document.getElementById("textoSaida");
    const btnConverter = document.getElementById("btnConverter");
    const btnCopiar = document.getElementById("btnCopiar");
    const opcoesConversao = document.querySelectorAll('input[name="tipoConversao"]');
    const cntPalavras = document.getElementById("cntPalavras");
    const cntCaracteres = document.getElementById("cntCaracteres");
    const cntLinhas = document.getElementById("cntLinhas");

    // Textarea oculto para medir linhas visuais (incluindo quebras automáticas)
    const medidorLinhas = document.createElement("textarea");
    medidorLinhas.setAttribute("aria-hidden", "true");
    Object.assign(medidorLinhas.style, {
      position: "absolute",
      top: "-9999px",
      left: "-9999px",
      visibility: "hidden",
      height: "auto",
      overflow: "hidden",
    });
    document.body.appendChild(medidorLinhas);

    function sincronizarEstiloMedidor() {
      const cs = getComputedStyle(textoEntrada);
      medidorLinhas.style.width = textoEntrada.clientWidth + "px";
      medidorLinhas.style.font = cs.font;
      medidorLinhas.style.padding = cs.padding;
      medidorLinhas.style.lineHeight = cs.lineHeight;
      medidorLinhas.style.whiteSpace = "pre-wrap";
      medidorLinhas.style.wordBreak = cs.wordBreak;
    }

    function contarLinhasVisuais(texto) {
      if (texto === "") return 0;
      medidorLinhas.value = texto;
      const cs = getComputedStyle(medidorLinhas);
      const lineHeight = parseFloat(cs.lineHeight);
      const paddingTop = parseFloat(cs.paddingTop);
      const paddingBottom = parseFloat(cs.paddingBottom);
      return Math.max(1, Math.round((medidorLinhas.scrollHeight - paddingTop - paddingBottom) / lineHeight));
    }

    window.addEventListener("resize", sincronizarEstiloMedidor);

    function atualizarContador() {
      const texto = textoEntrada.value;
      cntCaracteres.textContent = texto.length;
      cntPalavras.textContent = texto.trim() === "" ? 0 : texto.trim().split(/\s+/).length;
      cntLinhas.textContent = contarLinhasVisuais(texto);
    }

    function capitalizarPrimeiraLetraDeCadaLinha(texto) {
      return texto
        .split("\n")
        .map((linha) => {
          const linhaSemEspacosInicio = linha.trimStart();

          if (!linhaSemEspacosInicio) {
            return linha;
          }

          const indicePrimeiraLetra = linha.indexOf(linhaSemEspacosInicio[0]);

          return (
            linha.slice(0, indicePrimeiraLetra) +
            linhaSemEspacosInicio.charAt(0).toUpperCase() +
            linhaSemEspacosInicio.slice(1).toLowerCase()
          );
        })
        .join("\n");
    }

    function splitFrases(texto) {
      return texto
        .split(/(?<=[.!?])\s+|\n+/)
        .map((f) => f.trim().replace(/[;.!?]+$/, ""))
        .filter((f) => f.length > 0);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatarBulletPointMarkdown(texto) {
      const frases = splitFrases(texto);
      if (frases.length === 0) return "";
      const itens = frases
        .map((frase, i) => {
          const pontuacao = i < frases.length - 1 ? ";" : ".";
          return `<li>${escapeHtml(frase)}${pontuacao}</li>`;
        })
        .join("");
      return `<ul>${itens}</ul>`;
    }

    function formatarBulletPointNegritoDocs(texto) {
      const frases = splitFrases(texto);
      if (frases.length === 0) return "";
      const itens = frases
        .map((frase, i) => {
          const pontuacao = i < frases.length - 1 ? ";" : ".";
          const colonIndex = frase.indexOf(":");
          if (colonIndex > 0) {
            const antes = escapeHtml(frase.slice(0, colonIndex));
            const depois = escapeHtml(frase.slice(colonIndex));
            return `<li><b>${antes}</b>${depois}${pontuacao}</li>`;
          }
          return `<li>${escapeHtml(frase)}${pontuacao}</li>`;
        })
        .join("");
      return `<ul>${itens}</ul>`;
    }

    function organizarPalavrasChaveVolume(texto) {
      const linhas = texto.split("\n").map(l => l.trim()).filter(l => l.length > 0);
      const itens = [];

      for (const linha of linhas) {
        let keyword = null;
        let volume = null;

        // Formato separado por tab (cópia de tabela do browser)
        const partes = linha.split("\t");
        if (partes.length >= 3) {
          const candidateKeyword = partes[1].trim();
          const candidateVolume = partes[2].replace(/[^\d.]/g, "").trim();
          if (candidateKeyword && /^\d[\d.]*$/.test(candidateVolume)) {
            keyword = candidateKeyword;
            volume = candidateVolume;
          }
        }

        // Formato concatenado (sem tabs visíveis)
        if (!keyword || !volume) {
          const semNum = linha.replace(/^\d+/, "");
          const match = semNum.match(/^([\p{L}\s]+?)\s*(\d{1,3}(?:\.\d{3})*|\d+)(?=\D|$)/u);
          if (match) {
            keyword = match[1].trim();
            volume = match[2];
          }
        }

        if (keyword && volume) {
          const volumeNum = parseInt(volume.replace(/\./g, ""), 10);
          if (!isNaN(volumeNum) && volumeNum > 0) {
            itens.push({ keyword, volume, volumeNum });
          }
        }
      }

      itens.sort((a, b) => b.volumeNum - a.volumeNum);
      return itens.map(item => `${item.keyword} (${item.volume})`).join("\n");
    }

    function converterTexto() {
      const texto = textoEntrada.value;
      const tipoSelecionado = document.querySelector('input[name="tipoConversao"]:checked').value;

      if (tipoSelecionado === "maiusculas") {
        textoSaida.textContent = texto.toUpperCase();
      } else if (tipoSelecionado === "minusculas") {
        textoSaida.textContent = texto.toLowerCase();
      } else if (tipoSelecionado === "primeiraLetra") {
        textoSaida.textContent = capitalizarPrimeiraLetraDeCadaLinha(texto);
      } else if (tipoSelecionado === "bulletPointMarkdown") {
        textoSaida.innerHTML = formatarBulletPointMarkdown(texto);
      } else if (tipoSelecionado === "bulletPointNegritoDocs") {
        textoSaida.innerHTML = formatarBulletPointNegritoDocs(texto);
      } else if (tipoSelecionado === "removerNumeros") {
        textoSaida.textContent = texto
          .split("\n")
          .map((linha) => linha.replace(/\s*\(?\d+\)?/g, "").replace(/[ \t]{2,}/g, " ").trim())
          .join("\n");
      } else if (tipoSelecionado === "organizarPalavrasChaveVolume") {
        textoSaida.textContent = organizarPalavrasChaveVolume(texto);
      }
    }

    btnCopiar.addEventListener("click", () => {
      const tipoSelecionado = document.querySelector('input[name="tipoConversao"]:checked').value;
      const tiposHtml = ["bulletPointMarkdown", "bulletPointNegritoDocs"];
      const ehHtml = tiposHtml.includes(tipoSelecionado);

      if (!textoSaida.innerText.trim()) return;

      const concluir = () => {
        btnCopiar.textContent = "Copiado!";
        btnCopiar.classList.add("copiado");
        setTimeout(() => {
          btnCopiar.textContent = "Copiar";
          btnCopiar.classList.remove("copiado");
        }, 2000);
      };

      if (ehHtml) {
        const html = textoSaida.innerHTML;
        const plain = textoSaida.innerText;
        const item = new ClipboardItem({
          "text/html": new Blob([html], { type: "text/html" }),
          "text/plain": new Blob([plain], { type: "text/plain" }),
        });
        navigator.clipboard.write([item]).then(concluir);
      } else {
        navigator.clipboard.writeText(textoSaida.textContent).then(concluir);
      }
    });

    btnConverter.addEventListener("click", converterTexto);
    textoEntrada.addEventListener("input", () => { converterTexto(); atualizarContador(); });

    textoEntrada.addEventListener("paste", () => {
      setTimeout(() => { converterTexto(); atualizarContador(); }, 0);
    });

    opcoesConversao.forEach((opcao) => {
      opcao.addEventListener("change", converterTexto);
    });

    sincronizarEstiloMedidor();
  </script>
</body>
</html>
